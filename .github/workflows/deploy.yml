name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Generate service worker
        run: node scripts/generate-firebase-sw.mjs
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAhgGIhmiJYS5ZxA4N0HETLBa9W3EcWErI
          VITE_FIREBASE_AUTH_DOMAIN: follow-through-87d50.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: follow-through-87d50
          VITE_FIREBASE_STORAGE_BUCKET: follow-through-87d50.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "153740630717"
          VITE_FIREBASE_APP_ID: 1:153740630717:web:46e7580b3c75564c74b5d4
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAhgGIhmiJYS5ZxA4N0HETLBa9W3EcWErI
          VITE_FIREBASE_AUTH_DOMAIN: follow-through-87d50.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: follow-through-87d50
          VITE_FIREBASE_STORAGE_BUCKET: follow-through-87d50.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "153740630717"
          VITE_FIREBASE_APP_ID: 1:153740630717:web:46e7580b3c75564c74b5d4
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only firestore:rules,firestore:indexes,functions,hosting --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
